<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Film Wheel — WebGL Photobooth Strip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <!-- Inline bg so the very first paint is brown — no white flash before bundled CSS loads -->
    <style>html, body { background: #15100B; margin: 0; }</style>
  </head>
  <body>

    <h1 class="bg-number" id="bg-number">01</h1>

    <!-- Pre-loader: minimal, tiny mono counter on the dark cinema bg -->
    <div class="pre-loader" id="pre-loader" aria-hidden="true">
      <span id="pre-loader-pct">000</span>
    </div>

    <div id="canvas-container"></div>

    <!-- Codrops-style chrome overlay -->
    <div class="frame">
      <header class="frame__top">
        <h1 class="frame__title">Film Wheel</h1>
        <nav class="frame__nav">
          <a href="https://karim-saab.com" class="link" target="_blank">Portfolio</a>
          <a href="https://github.com/mawzeee/webgl-wheel" class="link" target="_blank">GitHub</a>
        </nav>
        <div class="frame__tags">
          <a href="#" class="tag">#webgl</a>
          <a href="#" class="tag">#three.js</a>
          <a href="#" class="tag">#glsl</a>
          <a href="#" class="tag">#film</a>
          <a href="#" class="tag">#shader</a>
          <a href="#" class="tag">#scroll</a>
        </div>
      </header>

      <span class="frame__counter" id="frame-counter">001 / 025</span>

      <footer class="frame__bottom">
        <div class="slide-info">
          <span class="mono-xs" id="exposure-label">Exposure 001</span>
          <h2 class="slide-title" id="slide-title"><span class="line-wrap"><span class="line">The Card</span></span><span class="line-wrap"><span class="line">Players</span></span></h2>
        </div>

        <div class="frame__meta">
          <span class="mono-xs" id="stock-label">35mm · Kodak Vision 250D</span>
          <span class="mono-xs muted">Press D for debug tools</span>
        </div>
      </footer>

      <div class="nav-buttons">
        <button id="prev-btn" class="nav-btn" aria-label="Previous frame">←</button>
        <button id="next-btn" class="nav-btn" aria-label="Next frame">→</button>
      </div>

      <div class="byline">
        <span class="mono-xs muted">By</span>
        <span class="mono-xs strong">Karim Saab</span>
      </div>
    </div>

    <!-- Peek view: opens when a frame is clicked -->
    <div class="peek" id="peek" aria-hidden="true">
      <div class="peek__backdrop"></div>
      <img class="peek__image" id="peek-image" alt="" />
      <div class="peek__meta">
        <span class="mono-xs" id="peek-index">001 / 025</span>
        <h3 class="peek__title" id="peek-title">The Card Players</h3>
        <span class="mono-xs muted" id="peek-stock">35mm · Kodak Vision 250D</span>
      </div>
      <button class="peek__close" id="peek-close" aria-label="Close">Close · Esc</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
