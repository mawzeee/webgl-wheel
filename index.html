<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MAWZE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Inline bg so the very first paint is brown — no white flash before bundled CSS loads -->
    <style>html, body { background: #15100B; margin: 0; }</style>
  </head>
  <body>

    <h1 class="bg-number" id="bg-number">01</h1>

    <!-- Pre-loader: minimal, tiny mono counter on the dark cinema bg -->
    <div class="pre-loader" id="pre-loader" aria-hidden="true">
      <span id="pre-loader-pct">000</span>
    </div>

    <div id="canvas-container"></div>

    <!-- Codrops-style chrome overlay -->
    <div class="frame">
      <nav class="navbar" id="navbar">
        <a href="/" class="navbar__logo">MAWZE</a>
        <div class="navbar__right">
          <div class="navbar__links">
            <a href="#" class="navbar__link">Gallery</a>
            <a href="#" class="navbar__link">Archive</a>
            <a href="#" class="navbar__link">About</a>
            <a href="#" class="navbar__link">Contact</a>
          </div>
          <span class="navbar__counter" id="frame-counter">001 / 025</span>
        </div>
      </nav>

      <!-- Full-screen technical frame: 4 registration marks at viewport corners -->
      <span class="hero-mark hero-mark--tl" aria-hidden="true"></span>
      <span class="hero-mark hero-mark--tr" aria-hidden="true"></span>
      <span class="hero-mark hero-mark--bl" aria-hidden="true"></span>
      <span class="hero-mark hero-mark--br" aria-hidden="true"></span>

      <!-- Horizontal axis: a thin hairline that ties the bottom-left tech row
           to the bottom-right meta row, forming the technical spine. -->
      <hr class="hero-axis" aria-hidden="true" />

      <footer class="frame__bottom">
        <div class="slide-info">
          <span class="mono-xs" id="exposure-label">Exposure 001</span>
          <h2 class="slide-title" id="slide-title"><span class="line-wrap"><span class="line">The Card</span></span><span class="line-wrap"><span class="line">Players</span></span></h2>
        </div>

        <!-- Bottom-left: per-frame camera metadata -->
        <div class="hero-tech" id="hero-tech" aria-hidden="true">
          <span class="hero-tech__item" id="hero-tech-idx">001/025</span>
          <span class="hero-tech__sep">·</span>
          <span class="hero-tech__item" id="hero-tech-iso">ISO 200</span>
          <span class="hero-tech__sep">·</span>
          <span class="hero-tech__item" id="hero-tech-ap">f/2.8</span>
          <span class="hero-tech__sep">·</span>
          <span class="hero-tech__item" id="hero-tech-sh">1/125<i>s</i></span>
          <span class="hero-tech__sep">·</span>
          <span class="hero-tech__item" id="hero-tech-ev">EV −0.3</span>
        </div>

        <!-- Bottom-right: stock + live scroll coordinate (balances the left row) -->
        <div class="frame__meta">
          <span class="hero-tech__item" id="stock-label">35mm · Kodak Vision 250D</span>
          <span class="hero-tech__sep">·</span>
          <span class="hero-tech__item hero-tech__live" id="hero-tech-phi">φ 0.0000</span>
        </div>
      </footer>

      <div class="byline">
        <span class="mono-xs muted">By</span>
        <span class="mono-xs strong">Karim Saab</span>
      </div>

    </div>


    <!-- Peek view: opens when a frame is clicked -->
    <div class="peek" id="peek" aria-hidden="true">
      <div class="peek__backdrop"></div>
      <img class="peek__image" id="peek-image" alt="" />
      <div class="peek__meta">
        <span class="mono-xs" id="peek-index">001 / 025</span>
        <h3 class="peek__title" id="peek-title">The Card Players</h3>
        <span class="mono-xs muted" id="peek-stock">35mm · Kodak Vision 250D</span>
      </div>
      <button class="peek__close" id="peek-close" aria-label="Close">Close · Esc</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
