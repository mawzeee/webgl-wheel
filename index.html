<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MAWZE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Inline bg so the very first paint is brown — no white flash before bundled CSS loads -->
    <style>
      html, body { background: #000; margin: 0; color: #EFE6D6; }
      #pre-loader, #pre-loader-pct { color: #EFE6D6 !important; }
    </style>
  </head>
  <body>

    <!-- Void backdrop: full-bleed black sitting behind the home card.
         At rest the home card (canvas + chrome) covers 100% of the viewport
         so the backdrop is never visible. During a route transition, GSAP
         flips this to opaque so the home card — now scaled 0.8 and lifted
         -30vh — reads as a "white card on black void", exactly like the
         Codrops reference. This is the entire depth effect. -->
    <div class="void-backdrop" id="void-backdrop" aria-hidden="true"></div>

    <!-- Viewfinder: four terminal-style corner brackets locking onto the
         currently-centered frame. Fixed in screen center; the slider
         scrolls images through it. A small pulse fires on every frame
         change so the "lock-on" reads kinetically. -->
    <div class="viewfinder" id="viewfinder" aria-hidden="true">
      <span class="viewfinder__corner viewfinder__corner--tl"></span>
      <span class="viewfinder__corner viewfinder__corner--tr"></span>
      <span class="viewfinder__corner viewfinder__corner--bl"></span>
      <span class="viewfinder__corner viewfinder__corner--br"></span>
    </div>

    <!-- Pre-loader: minimal, tiny mono counter on the dark cinema bg -->
    <div class="pre-loader" id="pre-loader" aria-hidden="true">
      <span id="pre-loader-pct">000</span>
    </div>

    <div id="canvas-container"></div>

    <!-- Editorial chrome — strict 4-corner grid, each corner one job only. -->
    <div class="frame">
      <nav class="navbar" id="navbar">
        <a href="/" class="navbar__logo">MAWZE</a>
        <div class="navbar__links">
          <a href="#" class="navbar__link">Index</a>
          <a href="#" class="navbar__link">Archive</a>
          <a href="#" class="navbar__link">About</a>
        </div>
      </nav>

      <!-- Middle-left: the one piece of editorial typography -->
      <div class="slide-info">
        <h2 class="slide-title" id="slide-title"><span class="line-wrap"><span class="line">Slow</span></span><span class="line-wrap"><span class="line">Burn</span></span></h2>
      </div>

      <!-- Middle-right: instrument panel — radar chart + metric readouts.
           Every value is driven by the current frame's signature object.
           Axes + bars morph on frame change via GSAP. -->
      <aside class="instrument" id="instrument" aria-hidden="true">
        <div class="instrument__head">
          <span class="instrument__label">SIGNATURE</span>
          <span class="instrument__index" id="instrument-index">001</span>
        </div>

        <svg class="instrument__radar" viewBox="-110 -110 220 220" aria-hidden="true">
          <!-- Grid rings (static) -->
          <polygon class="radar-grid" id="radar-grid-1"></polygon>
          <polygon class="radar-grid" id="radar-grid-2"></polygon>
          <polygon class="radar-grid" id="radar-grid-3"></polygon>
          <!-- Axis lines (static) -->
          <g class="radar-axes" id="radar-axes"></g>
          <!-- Axis labels (static) -->
          <g class="radar-labels" id="radar-labels"></g>
          <!-- Data polygon (morphs per frame) -->
          <polygon class="radar-data" id="radar-data"></polygon>
          <!-- Data vertex markers (morph per frame) -->
          <g class="radar-points" id="radar-points"></g>
        </svg>

        <div class="readout">
          <div class="readout__row" data-metric="stylize">
            <span class="readout__key">STYLIZE</span>
            <span class="readout__val" id="rd-stylize">000</span>
            <span class="readout__bar"><i class="readout__fill" id="bar-stylize"></i></span>
          </div>
          <div class="readout__row" data-metric="chaos">
            <span class="readout__key">CHAOS</span>
            <span class="readout__val" id="rd-chaos">00</span>
            <span class="readout__bar"><i class="readout__fill" id="bar-chaos"></i></span>
          </div>
          <div class="readout__row" data-metric="weight">
            <span class="readout__key">WEIGHT</span>
            <span class="readout__val" id="rd-weight">0.00</span>
            <span class="readout__bar"><i class="readout__fill" id="bar-weight"></i></span>
          </div>
          <div class="readout__row" data-metric="temp">
            <span class="readout__key">TEMP</span>
            <span class="readout__val" id="rd-temp">0000K</span>
            <span class="readout__bar"><i class="readout__fill" id="bar-temp"></i></span>
          </div>
          <div class="readout__row" data-metric="sat">
            <span class="readout__key">SAT</span>
            <span class="readout__val" id="rd-sat">00%</span>
            <span class="readout__bar"><i class="readout__fill" id="bar-sat"></i></span>
          </div>
          <div class="readout__row readout__row--seed" data-metric="seed">
            <span class="readout__key">SEED</span>
            <span class="readout__val readout__val--mono" id="rd-seed">0000000</span>
          </div>
        </div>
      </aside>

      <!-- Bottom-left: canonical frame identity + camera metadata (one row, tabular) -->
      <div class="hero-tech" id="hero-tech" aria-hidden="true">
        <span class="hero-tech__item hero-tech__idx" id="hero-tech-idx">001/025</span>
        <span class="hero-tech__sep">·</span>
        <span class="hero-tech__item" id="hero-tech-iso">ISO 200</span>
        <span class="hero-tech__sep">·</span>
        <span class="hero-tech__item" id="hero-tech-ap">f/2.8</span>
        <span class="hero-tech__sep">·</span>
        <span class="hero-tech__item" id="hero-tech-sh">1/125<i>s</i></span>
        <span class="hero-tech__sep">·</span>
        <span class="hero-tech__item" id="hero-tech-ev">EV −0.3</span>
      </div>

      <!-- Bottom-right: stock + live scroll coordinate -->
      <div class="frame__meta">
        <span class="hero-tech__item" id="stock-label">35mm · Kodak Vision 250D</span>
        <span class="hero-tech__sep">·</span>
        <span class="hero-tech__item hero-tech__live" id="hero-tech-phi">φ 0.0000</span>
      </div>
    </div>


    <!-- Detail page — rendered on /frame/:id. Hidden on /. -->
    <main class="detail" id="detail" aria-hidden="true"></main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
